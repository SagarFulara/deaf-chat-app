<!DOCTYPE html>
<html lang="en">
<head>
  <title>Deaf Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script src="/socket.io/socket.io.js"></script>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">

    <!-- THEME TOGGLE (LOGIN TOP RIGHT) -->
    <div class="login-top">
      <button id="themeToggleLogin" class="theme-pill small">
        🌙 <span>Dark</span>
      </button>
    </div>

    <div class="login-logo">🤟</div>
    <h2>Deaf Chat</h2>
    <p class="subtitle">Real-time gesture & video communication</p>

    <input id="name" placeholder="Your name">
    <input id="room" placeholder="Room code">

    <button onclick="join()">Enter Room →</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

  <!-- HEADER -->
  <div class="app-header">

    <div class="brand">🤟 Deaf Chat</div>

    <div class="header-right">
      <div class="status-dot">
        <div class="dot"></div>
        <span id="roomLabel">Connected</span>
      </div>

      <!-- THEME TOGGLE -->
      <button id="themeToggle" class="theme-pill">
        🌙 <span>Dark</span>
      </button>
    </div>

  </div>

  <!-- VIDEOS -->
  <div class="videos">
    <div class="video-box">
      <span class="video-label">YOU</span>
      <video id="localVideo" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <p id="myGesture">Your Gesture: —</p>
    </div>

    <div class="video-box">
      <span class="video-label">REMOTE</span>
      <video id="remoteVideo" autoplay playsinline></video>
      <p id="remoteGesture">Remote: —</p>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn-start" onclick="startCall()">🎥 Start Call</button>
    <button class="btn-end" onclick="endCall()">❌ End Call</button>
    <button class="btn-start" onclick="startGesture()">🤟 Start Gesture</button>
    <button class="btn-end" onclick="stopGesture()">🛑 Stop Gesture</button>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="chat-header">💬 Messages</div>
    <div id="messages"></div>

    <div class="chat-input">
      <input id="msg" placeholder="Type a message..."
             onkeydown="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Send</button>
    </div>

    <div class="file-input">
      <input type="file" id="file">
      <button onclick="sendFile()">📎 Send</button>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
