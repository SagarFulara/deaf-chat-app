<!DOCTYPE html>
<html>
<head>
  <title>Deaf Chat</title>

  <!-- IMPORTANT FOR RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <script src="/socket.io/socket.io.js"></script>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<div id="login">
  <h2>Deaf Chat</h2>
  <input id="name" placeholder="Name">
  <input id="room" placeholder="Room">
  <button onclick="join()">Join</button>
</div>

<div id="main" style="display:none;">

  <div class="videos">

    <div class="video-box">
      <video id="localVideo" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <p id="myGesture">Your Gesture: -</p>
    </div>

    <div class="video-box">
      <video id="remoteVideo" autoplay playsinline></video>
      <p id="remoteGesture">Remote: -</p>
    </div>

  </div>

  <div class="controls">
    <button class="start" onclick="startCall()">Start Call</button>
    <button class="end" onclick="endCall()">End Call</button>

    <button class="start" onclick="startGesture()">Start Gesture</button>
    <button class="end" onclick="stopGesture()">End Gesture</button>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <div class="chat-input">
      <input id="msg" placeholder="Message">
      <button onclick="sendMsg()">Send</button>
    </div>

    <div class="file-input">
      <input type="file" id="file">
      <button onclick="sendFile()">Send File</button>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
