<!DOCTYPE html>
<html>
<head>
    <title>Deaf Chat AI</title>
    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

<div class="container">
<div class="card">

<h1>Deaf Chat AI 🔥</h1>

<div id="loginBox">
    <input id="username" placeholder="Enter name">
    <input id="roomId" placeholder="Room ID">
    <button onclick="login()">Join</button>
</div>

<div id="chatBox" style="display:none;">

<h3>Welcome: <span id="userLabel"></span></h3>
<h4>Room: <span id="roomLabel"></span></h4>

<div id="messages"></div>

<input id="messageInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<br><br>

<input type="file" id="fileInput">
<button onclick="sendFile()">Send File</button>

<hr>

<button onclick="startCall()">Start Call</button>
<button onclick="endCall()">End Call</button>

<br><br>

<button onclick="startGesture()">Start Gesture</button>
<button onclick="stopGesture()">Stop Gesture</button>

<div class="video-area">
    <div>
        <video id="localVideo" autoplay muted playsinline></video>
        <p id="myGesture">Your Gesture: -</p>
    </div>

    <div>
        <video id="remoteVideo" autoplay playsinline></video>
        <p id="remoteGesture">Their Gesture: -</p>
    </div>
</div>

<!-- 🔥 HIDDEN VIDEO FOR GESTURE -->
<video id="gestureVideo" autoplay muted playsinline style="display:none;"></video>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
